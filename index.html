<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FarmEnglish — Английский для сезонных рабочих</title>
  <style>
    :root {
      --bg: #eef3fb;
      --bg-top: linear-gradient(180deg, #f7faff 0%, #eef3fb 42%, #ffffff 100%);
      --card: rgba(255, 255, 255, 0.9);
      --card-solid: #ffffff;
      --card-shadow:
        0 1px 2px rgba(60, 64, 67, 0.06),
        0 10px 28px rgba(66, 133, 244, 0.10);
      --card-shadow-hover:
        0 2px 8px rgba(60, 64, 67, 0.08),
        0 16px 38px rgba(66, 133, 244, 0.16);
      --text: #1b1b1f;
      --text2: #4a4d52;
      --text3: #69707c;
      --border: rgba(26, 115, 232, 0.14);
      --radius: 22px;
      --ne-primary: #1a73e8;
      --ne-primary-2: #8ab4f8;
      --ne-violet: #7c4dff;
      --ne-cyan: #12b5cb;
      --ne-green: #1aae39;
      --ne-amber: #f9ab00;
      --ne-coral: #e87830;
      --ne-magenta: #c23a82;
      --ne-red: #ef4444;
      --ne-teal: #14b8a6;
      --ne-ease: cubic-bezier(0.22, 1, 0.36, 1);
      --ne-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --c-a1: #e87830;
      --c-a2: #1aae39;
      --c-b1: #12b5cb;
      --c-b2: #1a73e8;
      --c-c1: #7c4dff;
      --c-c2: #5f6368;

      /* Aliases to bridge standard and ne- prefixed variables */
      --ne-bg: var(--bg);
      --ne-surface: var(--card);
      --ne-ink: var(--text);
      --ne-muted: var(--text2);
      --ne-hint: var(--text3);
      --ne-line: var(--border);
      --ne-shadow: var(--card-shadow);
      --ne-shadow-strong: var(--card-shadow-hover);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :focus-visible {
      outline: 2px solid var(--ne-primary);
      outline-offset: 2px;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      overflow-x: hidden;
    }

    .app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding-bottom: 30px;
      background: var(--bg-top);
      position: relative;
    }

    /* Header */
    .hdr {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 20px 10px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: rgba(240, 242, 245, 0.75);
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      font-size: 22px;
    }

    .logo-txt {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    .logo-txt em {
      font-style: normal;
      color: var(--c-a1);
    }

    .lang-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: var(--card-shadow);
      font-family: inherit;
    }

    .lang-btn span {
      font-size: 12px;
    }

    /* Hero — Title Section */
    .hero {
      margin: 20px 20px 0;
      padding: 0;
    }

    .hero-title {
      font-size: 30px;
      font-weight: 900;
      margin: 0 0 6px 0;
      line-height: 1.15;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    .hero-sub {
      font-size: 15px;
      color: var(--text2);
      margin: 0 0 24px;
      font-weight: 400;
    }

    /* Level Cards */
    .lv-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 0 16px 20px;
    }

    .lv-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px 20px 18px;
      position: relative;
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.25s, transform 0.15s;
      display: block;
      box-shadow: var(--card-shadow);
      cursor: pointer;
      overflow: hidden;
    }

    .lv-card::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 5px;
      background: currentColor;
      opacity: 0.9;
    }

    .lv-card:hover {
      box-shadow: var(--card-shadow-hover);
    }

    .lv-card:active {
      transform: scale(0.985);
    }

    .lv-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 10px;
    }

    .lv-icon-float {
      position: absolute;
      right: 18px;
      top: 18px;
      width: 34px;
      height: 34px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      opacity: 0.85;
    }

    .lv-name {
      display: block;
      font-size: 19px;
      font-weight: 800;
      margin-bottom: 8px;
      color: var(--text);
      line-height: 1.2;
      letter-spacing: -0.3px;
      padding-right: 40px;
    }

    .lv-desc {
      display: block;
      font-size: 14px;
      color: var(--text2);
      line-height: 1.4;
      margin-bottom: 16px;
      padding-right: 20px;
    }

    .lv-btm {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .lv-link {
      font-size: 14px;
      font-weight: 600;
      color: var(--c-a1);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .lv-link-arrow {
      font-size: 18px;
      transition: transform 0.2s;
      display: inline-flex;
      align-items: center;
    }

    .lv-card:hover .lv-link-arrow .icon {
      transform: translateX(3px);
    }

    .lv-prog-txt {
      font-size: 12px;
      color: var(--text3);
      font-weight: 500;
    }

    /* Locked Level */
    .lv-card.locked {
      opacity: 0.55;
      cursor: default;
    }

    .lv-card.locked:hover {
      box-shadow: var(--card-shadow);
    }

    .lv-card.locked:active {
      transform: none;
    }

    .lock-ic {
      position: absolute;
      right: 20px;
      top: 20px;
      font-size: 16px;
      color: var(--text3);
    }

    /* Bottom Nav */
    .nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      padding: 8px 0 22px 0;
      z-index: 100;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      text-decoration: none;
      color: var(--text3);
      border: none;
      background: none;
      cursor: pointer;
      transition: color 0.2s;
      font-family: inherit;
    }

    .nav-item.active {
      color: var(--c-a1);
    }

    .nav-ic {
      font-size: 22px;
      margin-bottom: 1px;
      transition: transform 0.2s;
    }

    .nav-item.active .nav-ic {
      transform: scale(1.1);
    }

    .nav-lbl {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      display: none;
      align-items: flex-end;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }

    .modal {
      width: 100%;
      max-width: 430px;
      background: #ffffff;
      border-radius: 20px 20px 0 0;
      padding: 20px 20px 36px 20px;
      animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes slideUp {
      from {
        transform: translateY(100%);
      }

      to {
        transform: translateY(0);
      }
    }

    .modal-handle {
      width: 36px;
      height: 4px;
      background: #d1d5db;
      border-radius: 2px;
      margin: 0 auto 20px auto;
    }

    .lang-opt {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border-radius: 14px;
      cursor: pointer;
      margin-bottom: 4px;
      transition: all 0.2s;
      border: 1px solid transparent;
    }

    .lang-opt:active {
      background: #f5f5f5;
    }

    .lang-opt.active {
      background: rgba(232, 120, 48, 0.08);
      border-color: rgba(232, 120, 48, 0.2);
    }

    .lang-opt .flag {
      font-size: 26px;
    }

    .lang-opt .name {
      font-size: 16px;
      font-weight: 600;
      flex: 1;
      color: var(--text);
    }

    .lang-opt .check {
      color: var(--c-a1);
      font-weight: 800;
      opacity: 0;
    }

    .lang-opt.active .check {
      opacity: 1;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    /* Stats Row */
    .stats-row {
      display: flex;
      gap: 10px;
      margin: 0 16px 24px;
    }

    .stat-pill {
      flex: 1;
      background: var(--card);
      border-radius: 14px;
      padding: 14px 12px;
      text-align: center;
      box-shadow: var(--card-shadow);
      cursor: default;
      transition: box-shadow 0.2s, transform 0.15s;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .stat-pill.clickable {
      cursor: pointer;
    }

    .stat-pill.clickable:hover {
      box-shadow: var(--card-shadow-hover);
    }

    .stat-pill.clickable:active {
      transform: scale(0.97);
    }

    .phrasebook-nav {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0 16px 20px;
      padding: 14px 18px;
      background: var(--card);
      border-radius: 16px;
      box-shadow: var(--card-shadow);
      text-decoration: none;
      color: var(--text);
      font-weight: 700;
      font-size: 15px;
      transition: box-shadow 0.2s, transform 0.15s;
    }

    .phrasebook-nav:active {
      transform: scale(0.97);
    }

    .phrasebook-nav .icon {
      color: var(--primary);
      font-size: 22px;
    }

    .phrasebook-nav-arrow {
      margin-left: auto;
      color: var(--primary);
      font-size: 18px;
      opacity: 0.7;
    }

    .stat-val {
      display: block;
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 2px;
    }

    .stat-ic {
      font-size: 16px;
      margin-bottom: 4px;
      display: block;
    }

    .stat-lbl {
      display: block;
      font-size: 10px;
      color: var(--text3);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    /* Material 3 Expressive + Neural Expressive skin */

    body {
      background:
        linear-gradient(135deg, rgba(26, 115, 232, 0.08), transparent 34%),
        linear-gradient(225deg, rgba(18, 181, 203, 0.08), transparent 32%),
        var(--bg);
      letter-spacing: 0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .app {
      background:
        linear-gradient(180deg, #f8faff 0%, #eef3fb 34%, #ffffff 100%);
      isolation: isolate;
    }

    .hdr {
      padding: 14px 16px 10px;
      background: rgba(248, 250, 255, 0.78);
      border-bottom: 1px solid rgba(26, 115, 232, 0.08);
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.8) inset;
    }

    .logo-wrap {
      min-height: 42px;
      padding: 4px 10px 4px 4px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(26, 115, 232, 0.12);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.86);
    }

    .logo-icon {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: linear-gradient(145deg, #e8f0fe 0%, #e6f4ea 100%);
      font-size: 18px;
    }

    .logo-txt {
      font-size: 17px;
      letter-spacing: 0;
    }

    .logo-txt em {
      color: var(--ne-primary);
    }

    .lang-btn {
      min-height: 42px;
      padding: 8px 14px;
      border-radius: 999px;
      border-color: rgba(26, 115, 232, 0.16);
      background: rgba(255, 255, 255, 0.84);
      box-shadow: var(--card-shadow);
      transition: transform 0.18s var(--ne-spring), box-shadow 0.22s ease, background 0.22s ease;
    }

    .lang-btn:active {
      transform: scale(0.96);
      background: #e8f0fe;
    }

    .hero {
      margin: 14px 16px 12px;
      padding: 26px 20px 22px;
      border-radius: 28px;
      color: #fff;
      overflow: hidden;
      position: relative;
      background:
        linear-gradient(145deg, #1a73e8 0%, #4285f4 50%, #7c4dff 100%);
      box-shadow:
        0 1px 2px rgba(26, 115, 232, 0.16),
        0 18px 42px rgba(66, 133, 244, 0.24);
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(125deg, rgba(255, 255, 255, 0.24) 0%, transparent 46%, rgba(255, 255, 255, 0.08) 100%);
      pointer-events: none;
    }

    .hero-title,
    .hero-sub {
      position: relative;
      z-index: 1;
      color: #fff;
    }

    .hero-title {
      font-size: 29px;
      letter-spacing: 0;
      line-height: 1.08;
      margin-bottom: 10px;
    }

    .hero-sub {
      margin-bottom: 0;
      color: rgba(255, 255, 255, 0.88);
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin: 0 16px 18px;
    }

    .stat-pill {
      min-height: 84px;
      border-radius: 18px;
      border: 1px solid rgba(26, 115, 232, 0.12);
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: var(--card-shadow);
    }

    .stat-pill.clickable:hover {
      transform: translateY(-1px);
    }

    .stat-val {
      color: var(--text);
      letter-spacing: 0;
    }

    .stat-lbl {
      color: var(--text3);
      letter-spacing: 0.08em;
    }

    .lv-list {
      gap: 12px;
      padding: 0 16px 26px;
    }

    .onboarding-card {
      border: 1px solid rgba(232, 120, 48, 0.22);
      border-radius: 22px;
      padding: 20px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.96), rgba(254, 247, 240, 0.94));
      box-shadow: 0 4px 16px rgba(232, 120, 48, 0.08);
      margin-bottom: 24px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      position: relative;
      overflow: hidden;
      text-align: left;
    }

    .onboarding-card::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 5px;
      background: var(--c-a1);
      opacity: 0.9;
    }

    .onboarding-title {
      font-size: 18px;
      font-weight: 800;
      color: var(--c-a1);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .onboarding-text {
      font-size: 14px;
      line-height: 1.5;
      color: var(--text);
      margin-bottom: 16px;
    }

    .onboarding-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--c-a1);
      color: #fff;
      padding: 10px 18px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 14px;
      border: none;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(232, 120, 48, 0.2);
      transition: background 0.15s, transform 0.1s;
      text-decoration: none;
    }

    .onboarding-btn:hover {
      background: #d46a24;
    }

    .onboarding-btn:active {
      transform: scale(0.97);
    }

    .lv-card {
      border: 1px solid rgba(26, 115, 232, 0.12);
      border-left: 0;
      border-radius: 22px;
      padding: 18px 18px 16px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(255, 255, 255, 0.82));
      box-shadow: var(--card-shadow);
      overflow: hidden;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      transition: transform 0.22s var(--ne-spring), box-shadow 0.22s ease, border-color 0.22s ease;
    }

    .lv-card::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 5px;
      background: currentColor;
      opacity: 0.9;
    }

    .lv-card:hover {
      transform: translateY(-2px);
      border-color: rgba(26, 115, 232, 0.22);
    }

    .lv-card:active {
      transform: scale(0.985);
    }

    .lv-badge {
      padding: 5px 10px;
      border-radius: 999px;
      background: color-mix(in srgb, currentColor 12%, white);
      letter-spacing: 0.08em;
    }

    .lv-icon-float {
      right: 16px;
      top: 16px;
      width: 42px;
      height: 42px;
      border-radius: 16px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.64);
    }

    .lv-name {
      font-size: 18px;
      letter-spacing: 0;
    }

    .lv-desc {
      color: var(--text2);
    }

    .lv-link {
      min-height: 34px;
      padding: 6px 12px;
      border-radius: 999px;
      background: color-mix(in srgb, currentColor 10%, white);
      font-weight: 750;
    }

    .lv-link-arrow .icon {
      font-size: 20px;
      transition: transform 0.22s var(--ne-spring);
    }

    .lv-prog-txt {
      padding: 5px 10px;
      border-radius: 999px;
      background: #eef3fb;
      color: var(--text2);
    }

    .lock-ic {
      background: #eef3fb;
      border-color: rgba(95, 99, 104, 0.14);
    }

    .modal-overlay {
      background: rgba(17, 24, 39, 0.36);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .modal {
      max-width: 430px;
      border-radius: 28px 28px 0 0;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(26, 115, 232, 0.12);
      box-shadow: 0 -18px 48px rgba(15, 23, 42, 0.18);
    }

    .modal-handle {
      background: #c7d5ee;
    }

    .lang-opt {
      border-radius: 18px;
      border-color: rgba(26, 115, 232, 0.08);
      background: rgba(248, 250, 255, 0.66);
    }

    .lang-opt:active {
      background: #e8f0fe;
      transform: scale(0.99);
    }

    .lang-opt.active {
      background: #e8f0fe;
      border-color: rgba(26, 115, 232, 0.26);
    }

    .lang-opt .check {
      color: var(--ne-primary);
    }

    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* Material Symbols Outlined — self-hosted, subset */
    @font-face {
      font-family: 'Material Symbols Outlined';
      src: url('assets/fonts/material-symbols-outlined.woff2') format('woff2');
      font-display: block;
    }

    .icon {
      font-family: 'Material Symbols Outlined';
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      font-size: 20px;
      line-height: 1;
      letter-spacing: normal;
      text-transform: none;
      display: inline-block;
      white-space: nowrap;
      direction: ltr;
      -webkit-font-smoothing: antialiased;
      user-select: none;
    }

    .nav-ic .icon {
      font-size: 24px;
    }
  </style>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a73e8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
</head>

<body>

  <div class="app" id="app">
    <!-- Header -->
    <div class="hdr">
      <div class="logo-wrap">
        <span class="logo-icon">🌿</span>
        <div class="logo-txt">Farm<em>English</em></div>
      </div>
      <button class="lang-btn" onclick="openModal()">
        <span id="cur_lang_flag">🇷🇺</span> <span id="cur_lang_name">RU</span>
      </button>
    </div>

    <!-- Hero — Title -->
    <div class="hero">
      <h1 class="hero-title" id="h_title">Английский для<br>сезонных работников</h1>
      <p class="hero-sub" id="h_sub">Выберите ваш уровень</p>
    </div>

    <!-- Stats + Navigation Pills -->
    <div class="stats-row">
      <div class="stat-pill">
        <span class="stat-val" id="st_lessons">0</span>
        <span class="stat-lbl" id="sl_lessons">уроков</span>
      </div>
      <a class="stat-pill clickable" href="a1.html#phrases">
        <span class="stat-ic"><span class="icon">chat_bubble</span></span>
        <span class="stat-val" id="st_words">0</span>
        <span class="stat-lbl" id="sl_words">слов</span>
      </a>
      <a class="stat-pill clickable" href="a1.html#progress">
        <span class="stat-ic"><span class="icon">bar_chart</span></span>
        <span class="stat-val" id="st_streak">0</span>
        <span class="stat-lbl" id="sl_streak">серия</span>
      </a>
    </div>

    <!-- Phrasebook nav button -->
    <a class="phrasebook-nav" id="phraseNav" href="a1.html#phrases">
      <span class="icon">menu_book</span>
      <span id="sl_phrasebook">Разговорник</span>
      <span class="phrasebook-nav-arrow">›</span>
    </a>

    <!-- Levels List -->
    <div class="lv-list" id="lv_list">
      <!-- JS renders levels here -->
    </div>


  </div>

  <!-- Language Modal -->
  <div class="modal-overlay" id="modal" onclick="closeModal(event)">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="lang-modal-title" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <p id="lang-modal-title" class="sr-only">Choose translation language</p>
      <div class="lv-list-modal" role="listbox" aria-label="Translation language">
        <div class="lang-opt" id="opt_ru" role="option" tabindex="0" aria-selected="false" onclick="changeLang('ru')" onkeydown="if(event.key==='Enter'||event.key===' '){changeLang('ru');event.preventDefault()}">
          <span class="flag">🇷🇺</span>
          <span class="name">Русский</span>
          <span class="check"><span class="icon">check</span></span>
        </div>
        <div class="lang-opt" id="opt_uz" role="option" tabindex="0" aria-selected="false" onclick="changeLang('uz')" onkeydown="if(event.key==='Enter'||event.key===' '){changeLang('uz');event.preventDefault()}">
          <span class="flag">🇺🇿</span>
          <span class="name">O'zbekcha</span>
          <span class="check"><span class="icon">check</span></span>
        </div>
        <div class="lang-opt" id="opt_tj" role="option" tabindex="0" aria-selected="false" onclick="changeLang('tj')" onkeydown="if(event.key==='Enter'||event.key===' '){changeLang('tj');event.preventDefault()}">
          <span class="flag">🇹🇯</span>
          <span class="name">Тоҷикӣ</span>
          <span class="check"><span class="icon">check</span></span>
        </div>
        <div class="lang-opt" id="opt_kg" role="option" tabindex="0" aria-selected="false" onclick="changeLang('kg')" onkeydown="if(event.key==='Enter'||event.key===' '){changeLang('kg');event.preventDefault()}">
          <span class="flag">🇰🇬</span>
          <span class="name">Кыргызча</span>
          <span class="check"><span class="icon">check</span></span>
        </div>
        <div class="lang-opt" id="opt_kz" role="option" tabindex="0" aria-selected="false" onclick="changeLang('kz')" onkeydown="if(event.key==='Enter'||event.key===' '){changeLang('kz');event.preventDefault()}">
          <span class="flag">🇰🇿</span>
          <span class="name">Қазақша</span>
          <span class="check"><span class="icon">check</span></span>
        </div>
      </div>
    </div>
  </div>

  <script src="translations.js"></script>
  <script>
    // Safe storage helpers
    function safeGetItem(key, fallback = '') {
      try {
        return localStorage.getItem(key) || fallback;
      } catch (e) {
        return fallback;
      }
    }

    function safeGetJSON(key, fallback = []) {
      try {
        const val = localStorage.getItem(key);
        if (!val) return fallback;
        if (typeof val === 'string' && !val.trim().startsWith('[')) {
          const splitVal = val.split(',').map(x => x.trim()).filter(Boolean);
          if (splitVal.length > 0) return splitVal;
        }
        const parsed = JSON.parse(val);
        if (Array.isArray(fallback) && !Array.isArray(parsed)) return fallback;
        return parsed;
      } catch (e) {
        try {
          const val = localStorage.getItem(key);
          if (val) {
            return val.split(',').map(x => x.trim()).filter(Boolean);
          }
        } catch (_) { }
        return fallback;
      }
    }

    function safeSetItem(key, value) {
      try {
        localStorage.setItem(key, value);
        return true;
      } catch (e) {
        console.error('LocalStorage write failed:', e);
        return false;
      }
    }

    // Colors must match CSS tokens: --c-a1 #e87830, --c-a2 #1aae39, --c-b1 #12b5cb, --c-b2 #1a73e8, --c-c1 #7c4dff
    const LEVELS = [
      { id: 'a1', code: 'CEFR A0-A1', name_key: 'level_a1_title', desc_key: 'level_a1_desc', file: 'a1.html', color: '#e87830', icon: '📘', iconBg: 'rgba(232,120,48,0.12)' },
      { id: 'a2', code: 'CEFR A1-A2', name_key: 'level_a2_title', desc_key: 'level_a2_desc', file: 'a2.html', color: '#1aae39', icon: '📗', iconBg: 'rgba(26,174,57,0.12)', locked: true },
      { id: 'b1', code: 'CEFR A2-B1', name_key: 'level_b1_title', desc_key: 'level_b1_desc', file: 'b1.html', color: '#12b5cb', icon: '📙', iconBg: 'rgba(18,181,203,0.12)', locked: true },
      { id: 'b2', code: 'CEFR B1-B2', name_key: 'level_b2_title', desc_key: 'level_b2_desc', file: 'b2.html', color: '#1a73e8', icon: '📕', iconBg: 'rgba(26,115,232,0.12)', locked: true },
      { id: 'c1', code: 'CEFR B2-C1', name_key: 'level_c1_title', desc_key: 'level_c1_desc', file: 'c1.html', color: '#7c4dff', icon: '💎', iconBg: 'rgba(124,77,255,0.12)', locked: true }
    ];

    function render() {
      const lang = window._lang || 'ru';

      // Stats
      const doneA1 = safeGetJSON('fe_a1', []);
      const doneA2 = safeGetJSON('fe_a2', []);
      const doneB1 = safeGetJSON('fe_b1', []);
      const doneA1Count = new Set(doneA1).size;
      const doneA2Count = new Set(doneA2).size;
      const doneB1Count = new Set(doneB1).size;
      const totalDone = doneA1Count + doneA2Count + doneB1Count;
      const wordsA1 = Number(safeGetItem('fe_words_a1', '0'));
      const wordsA2 = Number(safeGetItem('fe_words_a2', '0'));
      const wordsB1 = Number(safeGetItem('fe_words_b1', '0'));
      const courseWords = wordsA1 + wordsA2 + wordsB1;
      const storedWords = Number(safeGetItem('fe_words', '0'));
      const wordsLearned = Math.max(storedWords, courseWords || totalDone * 30);
      safeSetItem('fe_words', String(wordsLearned));
      document.getElementById('st_lessons').innerText = totalDone;
      document.getElementById('st_words').innerText = String(wordsLearned);
      document.getElementById('st_streak').innerText = safeGetItem('fe_streak', '0');

      // Language header
      const flags = { ru: '🇷🇺', uz: '🇺🇿', tj: '🇹🇯', kg: '🇰🇬', kz: '🇰🇿' };
      document.getElementById('cur_lang_name').innerText = lang.toUpperCase();
      document.getElementById('cur_lang_flag').innerText = flags[lang] || '🇷🇺';

      // Hero
      document.getElementById('h_title').innerHTML = t('hero_title');
      document.getElementById('h_sub').innerText = t('hero_sub');

      // Stat labels — first pill is lesson count, others surface words + streak
      document.getElementById('sl_lessons').innerText = t('lessons');
      document.getElementById('sl_words').innerText = t('stat_words_label');
      document.getElementById('sl_streak').innerText = t('stat_streak_label');
      document.getElementById('sl_phrasebook').innerText = t('nav_phrasebook');


      // Level cards
      const list = document.getElementById('lv_list');
      list.innerHTML = '';

      if (doneA1.length === 0) {
        list.innerHTML += `
          <div class="onboarding-card">
            <div class="onboarding-title">${t('onboard_title')}</div>
            <div class="onboarding-text">${t('onboard_text')}</div>
            <a class="onboarding-btn" href="a1.html">
              ${t('onboard_btn')} <span class="icon">arrow_forward</span>
            </a>
          </div>
        `;
      }

      LEVELS.forEach(lv => {
        let isLocked = lv.locked;
        if (lv.id === 'a2') {
          const isA1Complete = doneA1Count >= 15;
          isLocked = !isA1Complete;
        }

        const doneCount = lv.id === 'a1' ? doneA1Count : (lv.id === 'a2' ? doneA2Count : (lv.id === 'b1' ? doneB1Count : 0));
        const total = lv.id === 'b1' ? 6 : 15;

        const card = document.createElement('div');
        card.className = `lv-card ${isLocked ? 'locked' : ''}`;
        card.style.color = lv.color;
        card.setAttribute('role', 'button');
        card.setAttribute('tabindex', isLocked ? '-1' : '0');
        card.setAttribute('aria-label', `${t(lv.name_key)}${isLocked ? '. ' + t('locked') : ''}`);
        card.setAttribute('aria-disabled', isLocked ? 'true' : 'false');
        card.onclick = () => { if (!isLocked) window.location.href = lv.file; };
        card.onkeydown = (e) => { if (!isLocked && (e.key === 'Enter' || e.key === ' ')) { e.preventDefault(); window.location.href = lv.file; } };

        const linkLabel = isLocked ? t('locked') : (doneCount > 0 ? t('continue_btn') : t('start'));

        card.innerHTML = `
          ${isLocked
            ? '<span class="lock-ic"><span class="icon" style="font-size:18px">lock</span></span>'
            : `<div class="lv-icon-float" style="background:${lv.iconBg}">${lv.icon}</div>`
          }
          <span class="lv-badge" style="color:${lv.color}">${lv.code}</span>
          <span class="lv-name">${t(lv.name_key)}</span>
          <span class="lv-desc">${t(lv.desc_key)}</span>
          <div class="lv-btm">
            <span class="lv-link" style="color:${lv.color}">
              ${linkLabel} <span class="lv-link-arrow"><span class="icon">chevron_right</span></span>
            </span>
            ${!isLocked && (lv.id === 'a1' || lv.id === 'a2' || lv.id === 'b1') ? `<span class="lv-prog-txt">${doneCount} / ${total}</span>` : ''}
          </div>
        `;
        list.appendChild(card);
      });

      // Active language in modal
      document.querySelectorAll('.lang-opt').forEach(opt => {
        const isActive = opt.id === 'opt_' + lang;
        opt.classList.toggle('active', isActive);
        opt.setAttribute('aria-selected', isActive ? 'true' : 'false');
      });
    }

    function openModal() { document.getElementById('modal').style.display = 'flex'; }
    function closeModal(e) { document.getElementById('modal').style.display = 'none'; }
    function changeLang(l) {
      setLang(l);  // setLang() из translations.js — обновляет window._lang и localStorage
      render();
      closeModal();
    }

    // Инициализация
    window.onload = render;
  </script>
  <script>
    if ('serviceWorker' in navigator &&
        (location.protocol === 'https:' || location.hostname === 'localhost')) {
      try { navigator.serviceWorker.register('sw.js'); } catch (_) {}
    }
  </script>

</body>

</html>
